<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-buttons class="backbtn" routerLink="/my-cart" routerDirection="back">
        <img src="../../assets/back-dark.svg" />
      </ion-buttons>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-button class="notification">
        <ion-icon name="home-outline" routerLink="/home"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true">
  <h1 class="title">Pagar</h1>

  <div class="cart-items">
    <ion-card mode="ios" *ngFor="let item of selectedItems; let i = index">
      <ion-card-content>
        <div class="item-img">
          <img src="{{item.url_img}}" />
        </div>
        <div class="item-info">
          <p>{{item.name_prod}}</p>
          <p>{{item.category}}</p>
          <p>${{item.price}}</p>
          <p><small>Cant:{{item.quantity}}</small></p>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
