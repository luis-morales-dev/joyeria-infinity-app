<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button>
        <img src="../../assets/menu_bar.svg" />
      </ion-menu-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <!--<ion-button class="notification">
        <ion-icon name="notifications-outline" color="dark"></ion-icon>
        <span>&nbsp;</span>
      </ion-button>-->
      <ion-button class="filter" routerLink="/my-cart" routerDirection="forward">
        <!--<ion-icon name="funnel-outline" color="dark"></ion-icon>-->
        <ion-icon name="cart-outline" color="dark"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="search ion-padding">
    <ion-item lines="none">
      <ion-input placeholder="Buscar productos"></ion-input>
      <ion-icon name="search-outline" slot="start"></ion-icon>
    </ion-item>
  </div>

  <div class="title ion-padding">
    <h2>Productos</h2>
    <p routerLink="/categories" routerDirection="back">Regresar</p>
  </div>

  <ion-grid>
    <ion-row class="product-grid">
      <h5 class="ion-text-center">{{msg_cat}}</h5>
      <ion-col size="6" *ngFor="let producto of Productos">
        <ion-col class="ion-text-left" [routerLink]="['/item-details', producto.id]" routerDirection="forward">
          <img src="{{producto.imagenes[0].path_imagen}}"> 
          <p>${{ producto.costo }}</p>
          <h6>{{ producto.nombre }}</h6>
        </ion-col>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
