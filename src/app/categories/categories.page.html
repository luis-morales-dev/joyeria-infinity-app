<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button>
        <img src="../../assets/menu_bar.svg" />
      </ion-menu-button>
    </ion-buttons>
    <ion-buttons slot="end">

      <ion-button class="filter" routerLink="/my-cart" routerDirection="forward">
        <!--<ion-icon name="funnel-outline" color="dark"></ion-icon>-->
        <ion-icon name="cart-outline" color="dark"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="title ion-padding">
    <h2>Categorias</h2>
    <p routerLink="/home" routerDirection="back">Regresar</p>
  </div>

  <!-- Skeleton loader -->
  <div class="categories-grid" *ngIf="isLoading">
    <div class="category-card skeleton-card" *ngFor="let i of [1,2,3,4,5,6]">
      <ion-skeleton-text animated class="skeleton-img"></ion-skeleton-text>
      <div class="card-label">
        <ion-skeleton-text animated style="width:70%;height:13px;border-radius:4px;"></ion-skeleton-text>
        <ion-skeleton-text animated style="width:40%;height:11px;border-radius:4px;margin-top:5px;"></ion-skeleton-text>
      </div>
    </div>
  </div>

  <!-- Grid de categorías -->
  <div class="categories-grid" *ngIf="!isLoading">
    
    <div
      class="category-card"
      *ngFor="let categoria of categorias"
      [routerLink]="['/category', categoria.id]"
      routerDirection="forward"
    >
      <!-- Imagen de fondo -->
      <div class="card-img-wrapper">
        <img
          *ngIf="categoria.image"
          [src]="categoria.image.src"
          [alt]="categoria.name"
          class="card-img"
        />
        <div class="card-img no-image" *ngIf="!categoria.image">
          <ion-icon name="grid-outline"></ion-icon>
        </div>
        <div class="card-overlay"></div>
      </div>

      <!-- Info sobre la imagen -->
      <div class="card-label">
        <h3 class="card-name">{{ categoria.name }}</h3>
        <span class="card-count">{{ categoria.count }} producto{{ categoria.count !== 1 ? 's' : '' }}</span>
      </div>
    </div>
  </div>

  <!-- Estado vacío -->
  <div class="empty-state" *ngIf="!isLoading && categorias.length === 0">
    <ion-icon name="folder-open-outline"></ion-icon>
    <p>No hay categorías disponibles</p>
  </div>

</ion-content>
