<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button>
        <img src="../../assets/menu_bar.svg" />
      </ion-menu-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <!--<ion-button class="notification">
        <ion-icon name="notifications-outline" color="dark"></ion-icon>
        <span>&nbsp;</span>
      </ion-button>-->
      <ion-button class="filter" routerLink="/my-cart" routerDirection="forward">
        <!--<ion-icon name="funnel-outline" color="dark"></ion-icon>-->
        <ion-icon name="cart-outline" color="dark"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="search ion-padding">
    <ion-item lines="none">
      <ion-input placeholder="Buscar productos"></ion-input>
      <ion-icon name="search-outline" slot="start"></ion-icon>
    </ion-item>
  </div>

  <div class="title ion-padding">
    <h2>Categorias</h2>
    <p routerLink="/home" routerDirection="back">Regresar</p>
  </div>

  <div class="category-slider ion-padding-start">
    <ion-card *ngFor="let categoria of Categorias">
      <ion-card-header>
        <ion-card-title [routerLink]="['/category', categoria.id]">{{ categoria.titulo }}</ion-card-title>
        <!--<ion-card-subtitle>Card Subtitle</ion-card-subtitle>-->
        <img src="{{ categoria.paht_img }}" />
      </ion-card-header>
    
    </ion-card>
  </div>

  <!--
  <ion-grid>
    <ion-row class="product-grid">
      <ion-col class="category-slider" size="6" *ngFor="let categoria of Categorias">
        <ion-card>
          <ion-card-header>
            <ion-card-title [routerLink]="['/category', categoria.id]">{{ categoria.titulo }}</ion-card-title>

            <img src="{{ categoria.paht_img }}" />
          </ion-card-header>
        
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
  -->

</ion-content>
